<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScale AI | Predictive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <style>
        :root {
            --accent-primary: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.3);
            --surface-color: rgba(15, 15, 18, 0.65);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            
            --safe: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 40px 20px;
            background-color: #050508;
            position: relative;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Crazy Morphing Title Box */
        .header-panel {
            text-align: center;
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-box {
            background: rgba(10, 10, 12, 0.85);
            border: 2px solid var(--border-color);
            padding: 25px 60px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
            min-width: 400px;
            max-width: 90%;
        }

        .title-box:hover {
            border-color: var(--accent-primary);
            animation: crazyMorph 6s infinite linear alternate;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 20px var(--accent-glow);
        }

        .title-box h1 {
            font-size: 38px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
            transition: all 0.4s ease;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            z-index: 2;
        }

        .title-box:hover h1 { text-shadow: 0 0 20px var(--accent-primary); }

        @keyframes crazyMorph {
            0% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
            50% { border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; }
            100% { border-radius: 80% 20% 70% 30% / 30% 70% 30% 70%; }
        }

        .header-panel p { color: var(--text-muted); margin-top: 20px; font-size: 15px; }

        /* Glassmorphism Cards */
        .card {
            background: var(--surface-color);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }

        /* ========================================== */
        /* CRAZY STATUS BAR WITH LASER SCANNER       */
        /* ========================================== */
        .system-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 30px !important;
            font-weight: 600;
            font-size: 15px;
            position: relative;
            overflow: hidden; /* Laser bahar na jaye */
            background: rgba(6, 6, 9, 0.85) !important;
            border-left: 4px solid var(--border-color);
            transition: all 0.5s ease;
        }

        /* Moving Laser Line */
        .laser-scanner {
            position: absolute;
            top: 0;
            left: -100%;
            width: 30%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 204, 0.25), transparent);
            animation: laserScan 2.5s infinite linear;
            pointer-events: none;
        }

        @keyframes laserScan {
            0% { left: -30%; }
            100% { left: 130%; }
        }

        /* Matrix/Glitch Style Text */
        #overallStatusText {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            letter-spacing: 1px;
            transition: all 0.4s ease;
        }
        /* ========================================== */

        /* Drag & Drop Upload Zone */
        .upload-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
            position: relative;
            margin-bottom: 20px;
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-primary);
            background: rgba(0, 255, 204, 0.05);
        }
        .upload-icon { font-size: 36px; margin-bottom: 10px; opacity: 0.8; }
        .upload-text { font-size: 14px; color: var(--text-muted); }
        .upload-text span { color: var(--accent-primary); font-weight: 600; }
        input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        /* Buttons */
        .btn-primary {
            width: 100%;
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.15), transparent);
            border: 1px solid var(--accent-primary);
            color: var(--accent-primary);
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary:hover {
            background: var(--accent-primary);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Dashboard Layout */
        #resultsDashboard { display: none; animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        @media (max-width: 900px) { .dashboard-grid { grid-template-columns: 1fr; } }

        /* Graph & Table */
        .graph-container img { width: 100%; border-radius: 12px; border: 1px solid var(--border-color); }
        
        .table-container { max-height: 400px; overflow-y: auto; padding-right: 5px; }
        .table-container::-webkit-scrollbar { width: 6px; }
        .table-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        table { width: 100%; border-collapse: collapse; font-family: 'JetBrains Mono', monospace; font-size: 13px; }
        th { background: rgba(0,0,0,0.6); color: var(--text-muted); text-transform: uppercase; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 1;}
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; }
        tr:hover td { background: rgba(255,255,255,0.05); }

        /* Badges */
        .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge.safe { background: rgba(52, 211, 153, 0.1); color: var(--safe); border: 1px solid var(--safe); }
        .badge.warning { background: rgba(251, 191, 36, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .badge.danger { background: rgba(248, 113, 113, 0.1); color: var(--danger); border: 1px solid var(--danger); box-shadow: 0 0 10px rgba(248, 113, 113, 0.3);}

        #errorAlert { display: none; background: rgba(248, 113, 113, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center;}
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div class="header-panel">
            <div class="title-box">
                <h1>NeuroScale Engine</h1>
            </div>
            <p>Advanced PPO & LSTM Workload Analysis Platform</p>
        </div>

        <div id="errorAlert"></div>

        <div class="card">
            <form id="uploadForm">
                <div class="upload-zone" id="dropZone">
                    <div class="upload-icon">📊</div>
                    <div class="upload-text" id="fileNameDisplay">
                        Drag & drop your CSV workload file here or <span>browse</span>
                    </div>
                    <input type="file" id="fileInput" accept=".csv" required>
                </div>
                <button type="submit" class="btn-primary" id="btnSubmit">Initialize Model Processing</button>
            </form>
        </div>

        <div id="resultsDashboard">
            <div class="card system-status" id="overallStatusCard">
                <div class="laser-scanner"></div>
                <span style="color: var(--text-muted); z-index: 1;">NEURAL CORE THREAT ENGINE:</span>
                <span id="overallStatusText" class="badge" style="z-index: 1;">READY</span>
            </div>

            <div class="dashboard-grid">
                <div class="card">
                    <h3 style="margin-bottom: 20px; color: var(--accent-primary); font-weight: 600;">Prediction Trajectory</h3>
                    <div class="graph-container">
                        <img id="forecastGraph" alt="AI Generated Graph" />
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 20px; color: var(--accent-primary); font-weight: 600;">Live Telemetry & Actions</h3>
                    <div class="table-container">
                        <table id="dataTable">
                            <thead>
                                <tr>
                                    <th>Timestamp</th>
                                    <th>Workload</th>
                                    <th>PPO Action</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Background Particles
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ffcc" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5 },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ffcc", "opacity": 0.2, "width": 1 },
                "move": { "enable": true, "speed": 2, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.8 } } }
            }
        });

        // Cyberpunk Matrix Text Decoder Function
        function decodeTextEffect(element, targetText, finalClass) {
            element.className = `badge ${finalClass}`;
            const chars = "01XYZ$%#@+=[]{}<>/⚡🤖CORE";
            let iterations = 0;
            
            const interval = setInterval(() => {
                element.innerText = targetText.split("")
                    .map((char, index) => {
                        if (index < iterations) return targetText[index];
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join("");
                
                if (iterations >= targetText.length) {
                    clearInterval(interval);
                }
                iterations += 1 / 3; // Speed control
            }, 30);
        }

        // Dashboard Elements & Logic
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const uploadForm = document.getElementById('uploadForm');
        const btnSubmit = document.getElementById('btnSubmit');
        const resultsDashboard = document.getElementById('resultsDashboard');
        const errorAlert = document.getElementById('errorAlert');

        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName();
            }
        });
        
        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (fileInput.files.length > 0) {
                fileNameDisplay.innerHTML = `<span style="color: #fff;">📁 ${fileInput.files[0].name}</span> attached.`;
            }
        }

        uploadForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            errorAlert.style.display = "none";
            resultsDashboard.style.display = "none";
            btnSubmit.disabled = true;
            btnSubmit.innerText = "Analyzing Neural Data...";

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            try {
                const response = await fetch("/predict", { method: "POST", body: formData });
                const result = await response.json();

                if (result.error) { showError(result.error); return; }

                let tableHTML = "";
                let maxLoad = 0;

                for (let i = 0; i < 24; i++) {
                    let loadValue = result.forecast[i].predicted_load;
                    let timeStamp = result.forecast[i].datetime;
                    let action = result.forecast[i].action;
                    
                    if(loadValue > maxLoad) maxLoad = loadValue;

                    let statusClass = "safe"; let statusText = "Normal";
                    if (loadValue > 80) { statusClass = "danger"; statusText = "Critical"; }
                    else if (loadValue > 50) { statusClass = "warning"; statusText = "Warning"; }

                    let actionColor = action === "Increase" ? "#34d399" : (action === "Decrease" ? "#f87171" : "#9ca3af");

                    tableHTML += `<tr>
                        <td>${timeStamp}</td>
                        <td style="font-weight: bold;">${loadValue.toFixed(4)}</td>
                        <td style="color: ${actionColor};">${action}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                    </tr>`;
                }

                document.getElementById("tableBody").innerHTML = tableHTML;

                // Triggering the smooth dashboard display
                resultsDashboard.style.display = "block";

                // Triggering the Crazy Cyberpunk Decrypt animation
                const statusCard = document.getElementById("overallStatusCard");
                const statusTextObj = document.getElementById("overallStatusText");
                
                let finalStatusText = "";
                let finalClass = "";

                if (maxLoad > 80) {
                    statusCard.style.borderLeft = "4px solid var(--danger)";
                    statusCard.style.boxShadow = "0 0 20px rgba(248, 113, 113, 0.2)";
                    finalStatusText = "CORE SYSTEM AT RISK - CRITICAL OVERLOAD";
                    finalClass = "danger";
                } else if (maxLoad > 50) {
                    statusCard.style.borderLeft = "4px solid var(--warning)";
                    statusCard.style.boxShadow = "0 0 20px rgba(251, 191, 36, 0.15)";
                    finalStatusText = "CORE WARNING - ELEVATED INTENSITY DETECTED";
                    finalClass = "warning";
                } else {
                    statusCard.style.borderLeft = "4px solid var(--safe)";
                    statusCard.style.boxShadow = "0 0 20px rgba(52, 211, 153, 0.15)";
                    finalStatusText = "CORE SYSTEM SECURE - PERFORMANCE OPTIMAL";
                    finalClass = "safe";
                }

                // Call matrix decoder function
                decodeTextEffect(statusTextObj, finalStatusText, finalClass);

                if (result.forecast_graph_base64) {
                    document.getElementById("forecastGraph").src = "data:image/png;base64," + result.forecast_graph_base64;
                }

            } catch (error) {
                showError("Connection lost or server failed to respond.");
            } finally {
                btnSubmit.disabled = false;
                btnSubmit.innerText = "Initialize Model Processing";
            }
        });

        function showError(message) {
            errorAlert.innerText = "⚠️ " + message;
            errorAlert.style.display = "block";
        }
    </script>
</body>
</html>
