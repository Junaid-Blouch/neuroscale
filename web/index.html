<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroScale AI Engine</title>
    <style>
        /* Modern Dark/Futuristic Styling */
        body {
            background-color: #0d1117;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #161b22;
            border: 1px solid #00ffcc;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            width: 80%;
            max-width: 600px;
        }
        h1 {
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #00ffcc;
            margin-bottom: 5px;
        }
        p {
            color: #8b949e;
            margin-bottom: 30px;
        }
        input[type="file"] {
            margin: 20px 0;
            color: #fff;
            padding: 10px;
            border: 1px dashed #00ffcc;
            background: #000;
            width: 90%;
        }
        button {
            background-color: transparent;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            padding: 12px 25px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            font-weight: bold;
            width: 100%;
        }
        button:hover {
            background-color: #00ffcc;
            color: #000;
            box-shadow: 0 0 15px #00ffcc;
        }
        #resultBox {
            margin-top: 25px;
            padding: 15px;
            background: #010409;
            border: 1px solid #444;
            color: #fff;
            min-height: 80px;
            white-space: pre-wrap;
            text-align: left;
            font-size: 14px;
            overflow-x: auto;
        }
        .error-text { color: #ff3366; font-weight: bold; }
        .success-text { color: #00ffcc; font-weight: bold; }
        .processing-text { color: #f0e68c; }
    </style>
</head>
<body>

    <div class="container">
        <h1>NeuroScale Engine</h1>
        <p>Advanced PPO & LSTM Workload Analysis Platform</p>
        
        <form id="uploadForm">
            <input type="file" id="csvFile" accept=".csv" required>
            <br><br>
            <button type="submit" id="submitBtn">Initialize Analysis</button>
        </form>

        <div id="resultBox">System Ready. Awaiting workload.csv input...</div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(event) {
            event.preventDefault(); // Page reload ko roknay ke liye
            
            const fileInput = document.getElementById('csvFile');
            const resultBox = document.getElementById('resultBox');
            const submitBtn = document.getElementById('submitBtn');

            // 1. Check if file is selected
            if (fileInput.files.length === 0) {
                resultBox.innerHTML = "<span class='error-text'>⚠️ Error: Please upload a CSV file first.</span>";
                return;
            }

            // 2. Prepare data for API
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);

            // 3. Update UI to show processing state
            resultBox.innerHTML = "<span class='processing-text'>🧠 Processing data through Neural Models... Please wait.</span>";
            submitBtn.disabled = true;
            submitBtn.innerText = "Analyzing...";

            try {
                // 4. THE ONLY API CALL (100% Correct Path)
                const response = await fetch('/api/v1/reports/predict', {
                    method: 'POST',
                    body: formData
                });

                // 5. Check if server crashed
                if (!response.ok) {
                    throw new Error(`Server returned status ${response.status}`);
                }

                // 6. Parse JSON result
                const result = await response.json();
                
                // 7. Display Results
                if (result.error) {
                    resultBox.innerHTML = `<span class='error-text'>⚠️ Engine Error: ${result.error}</span>`;
                } else {
                    // Agar report successfully generate ho gayi to JSON print karega
                    resultBox.innerHTML = `<span class='success-text'>✅ Analysis Complete!</span>\n\n` + JSON.stringify(result, null, 2);
                }

            } catch (error) {
                // Agar sach mein connection lost hua to asal wajah dikhayega
                resultBox.innerHTML = `<span class='error-text'>⚠️ Connection lost. Verify backend.</span>\nDetails: ${error.message}`;
            } finally {
                // Button ko wapis normal kar dein
                submitBtn.disabled = false;
                submitBtn.innerText = "Initialize Analysis";
            }
        });
    </script>

</body>
</html>
